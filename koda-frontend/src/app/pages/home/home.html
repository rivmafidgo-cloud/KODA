<!-- KODA Kiosk Vertical Layout (Optimized & Verified Responsiveness) -->
<div class="w-full h-full min-h-screen flex flex-col bg-brand-dark overflow-hidden select-none">
  
  <!-- TOP SECTION: Departments (65%) -->
  <div class="flex-[65] flex flex-col pt-10 px-6 pb-4 bg-gradient-to-b from-brand-dark to-gray-900 relative overflow-hidden">
    
    <!-- Subtle overlay -->
    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-5 pointer-events-none"></div>
    
    <!-- Header: Smaller and tighter -->
    <div class="z-10 flex flex-col items-center mb-8 shrink-0">
      <div class="flex items-center space-x-3 mb-1">
        <div class="w-10 h-10 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20">
          <span class="text-white text-lg font-bold">K</span>
        </div>
        <h1 class="text-white text-3xl font-light tracking-widest uppercase">Koda</h1>
      </div>
      <h2 class="text-white/60 text-lg font-light text-center px-4">Tocca un reparto per il biglietto</h2>
    </div>

    <!-- Departments Grid -->
    <div class="z-10 flex-1 flex items-center justify-center min-h-0">
      <!-- Loading state -->
      <div *ngIf="departments.length === 0" class="flex flex-col items-center animate-pulse">
        <div class="w-12 h-12 rounded-full border-4 border-white/20 border-t-white animate-spin mb-4"></div>
        <span class="text-white/50 text-xl font-light">Caricamento reparti...</span>
      </div>

      <div *ngIf="departments.length > 0" class="grid grid-cols-2 gap-4 w-full max-w-2xl h-full max-h-[50vh]">
        <button 
          *ngFor="let dept of departments"
          (click)="selectDepartment(dept)"
          class="group relative overflow-hidden rounded-2xl border border-white/5 shadow-lg transition-all duration-300 active:scale-95 focus:outline-none flex flex-col items-center justify-center p-3 min-h-0"
          [ngClass]="dept.color"
        >
          <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
          <div class="flex flex-col items-center justify-center text-center">
            <span class="text-4xl md:text-5xl mb-2 transform transition-transform duration-300 group-active:scale-110">{{ dept.icon }}</span>
            <span class="text-lg md:text-xl font-medium tracking-wide uppercase leading-tight px-1">{{ dept.name }}</span>
          </div>
          
          <!-- Ripple Effect -->
          <span class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <span class="w-full h-full bg-white/20 rounded-full opacity-0 group-active:animate-ripple"></span>
          </span>
        </button>
      </div>
    </div>
  </div>

  <!-- BOTTOM SECTION: Advertisements (35%) -->
  <div class="flex-[35] relative w-full bg-black overflow-hidden shadow-[0_-15px_40px_rgba(0,0,0,0.6)]">
    <div 
      *ngFor="let ad of ads; let i = index"
      class="absolute inset-0 w-full h-full transition-opacity duration-1000 ease-in-out"
      [class.opacity-100]="i === currentAdIndex"
      [class.opacity-0]="i !== currentAdIndex"
      [class.z-10]="i === currentAdIndex"
      [class.z-0]="i !== currentAdIndex"
    >
      <img [src]="ad" class="w-full h-full object-cover" alt="Advertisement">
      
      <!-- Gradient overlay -->
      <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
    </div>
  </div>

</div>
